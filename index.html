<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dona Marmita Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>
<body>

<!-- MENU -->
<div class="menu-top">
  <button onclick="trocarTela('crm')">📊 CRM</button>
  <button onclick="trocarTela('pedidos')">🍱 Pedidos</button>
  <button onclick="trocarTela('ia')">🤖 IA</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<!-- ================= CRM ================= -->
<div id="tela_crm" class="tela">

<div class="topo">
  <input type="file" id="fileInput">
  <button onclick="carregar()">Carregar</button>
  <button onclick="processar()">Processar</button>
  <button onclick="baixarPlanilha()">Baixar</button>
</div>

<div class="container">

<div class="painel">
  <h3>Mapear</h3>
  <select id="map_nome"></select>
  <select id="map_tel"></select>
  <select id="map_data"></select>
  <select id="map_valor"></select>
  <select id="map_cidade"></select>
</div>

<div class="preview">
  <h2>Preview</h2>
  <div id="preview"></div>
</div>

</div>

</div>

<!-- ================= PEDIDOS ================= -->
<div id="tela_pedidos" class="tela hidden">

<div class="pedidos-container">

  <div class="pedido-card">
    <h3>Novo Pedido</h3>

    <div class="grid">
      <input id="pedido_nome" placeholder="Cliente">
      <input id="pedido_tel" placeholder="Telefone">
      <input id="pedido_qtd" type="number" placeholder="Qtd">
    </div>

    <button class="btn-primary" onclick="criarPedidoUI()">Criar Pedido</button>
  </div>

  <div class="pedido-board">

    <div class="coluna">
      <h4>Pendentes</h4>
      <div id="col_pendente"></div>
    </div>

    <div class="coluna">
      <h4>Preparando</h4>
      <div id="col_preparando"></div>
    </div>

    <div class="coluna">
      <h4>Prontos</h4>
      <div id="col_pronto"></div>
    </div>

    <div class="coluna">
      <h4>Atrasados</h4>
      <div id="col_atrasado"></div>
    </div>

  </div>

</div>

</div>

<!-- ================= IA ================= -->
<div id="tela_ia" class="tela hidden">

<div class="box">
  <h3>Gerador de Campanha</h3>

  <textarea id="promptIA" placeholder="Digite sua campanha..."></textarea>

  <button class="btn-primary" onclick="gerarMensagem()">
    Gerar Mensagem
  </button>

  <div id="respostaIA"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
