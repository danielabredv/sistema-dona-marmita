<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dona Marmita Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Dona Marmita</h2>

    <button onclick="toggleDark()">🌙</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1>CRM</h1>

    <div class="upload-box">
      <input type="file" id="fileInput">
      <button onclick="carregar()">Carregar</button>
      <button id="btnProcessar" onclick="processar()">Analisar</button>
    </div>

    <div id="resumo" class="resumo"></div>

    <div class="filtros">
      <button onclick="setFiltro('Todos', this)" class="active">Todos</button>
      <button onclick="setFiltro('VIP', this)">VIP</button>
      <button onclick="setFiltro('Frequente', this)">Frequente</button>
      <button onclick="setFiltro('Em risco', this)">Risco</button>
      <button onclick="setFiltro('Inativo', this)">Inativo</button>
    </div>

    <div id="preview"></div>

  </main>

</div>

<!-- CORE INVISÍVEL -->
<div style="display:none;">
  <select id="map_nome"></select>
  <select id="map_tel"></select>
  <select id="map_data"></select>
  <select id="map_valor"></select>
  <select id="map_cidade"></select>

  <input id="data_inicio">
  <input id="data_fim">

  <input type="checkbox" id="cidade_aracaju" checked>
  <input type="checkbox" id="cidade_salvador" checked>

  <input id="cfg_vip_valor" value="1000">
  <input id="cfg_vip_qtd" value="10">
  <input id="cfg_freq_qtd" value="5">
  <input id="cfg_risco_min" value="15">
  <input id="cfg_risco_max" value="30">
  <input id="cfg_inativo" value="30">
</div>

<script src="script.js"></script>
</body>
</html>
