<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dona Marmita Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>
<body>

<!-- MENU -->
<div class="menu-top">
  <button onclick="trocarTela('crm')">📊 CRM</button>
  <button onclick="trocarTela('pedidos')">🍱 Pedidos</button>
  <button onclick="trocarTela('ia')">🤖 IA</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<!-- ================= CRM ================= -->
<div id="tela_crm" class="tela">

<div class="topo">
  <input type="file" id="fileInput">
  <button onclick="carregar()">Carregar</button>
  <button id="btnProcessar" onclick="processar()" disabled>Processar</button>
  <button onclick="baixarPlanilha()">Baixar</button>
</div>

<div class="container">

<!-- PAINEL -->
<div class="painel">

<h3>Mapeamento</h3>
<select id="map_nome"></select>
<select id="map_tel"></select>
<select id="map_data"></select>
<select id="map_valor"></select>
<select id="map_cidade"></select>

<h3>Filtros</h3>

<label>Data início</label>
<input type="date" id="data_inicio">

<label>Data fim</label>
<input type="date" id="data_fim">

<h4>Cidades</h4>
<label><input type="checkbox" id="cidade_aracaju" checked> Aracaju</label>
<label><input type="checkbox" id="cidade_salvador" checked> Salvador</label>

<h3>🎯 Tipo de Cliente</h3>
<div class="filtros-tipo">
  <button onclick="setFiltro('Todos', this)" class="active">Todos</button>
  <button onclick="setFiltro('VIP', this)">VIP</button>
  <button onclick="setFiltro('Frequente', this)">Frequente</button>
  <button onclick="setFiltro('Em risco', this)">Risco</button>
  <button onclick="setFiltro('Inativo', this)">Inativo</button>
</div>

<h3>⚙️ Configuração</h3>

<label>VIP valor</label>
<input type="number" id="cfg_vip_valor" value="1000">

<label>VIP quantidade</label>
<input type="number" id="cfg_vip_qtd" value="10">

<label>Frequente quantidade</label>
<input type="number" id="cfg_freq_qtd" value="5">

<label>Risco mínimo (dias)</label>
<input type="number" id="cfg_risco_min" value="15">

<label>Risco máximo (dias)</label>
<input type="number" id="cfg_risco_max" value="30">

<label>Inativo (dias)</label>
<input type="number" id="cfg_inativo" value="30">

</div>

<!-- RESULTADO -->
<div class="preview">

<h2>Resumo</h2>
<div id="resumo" class="resumo"></div>

<h2>Clientes</h2>
<div id="preview"></div>

</div>

</div>

</div>

<!-- ================= PEDIDOS ================= -->
<div id="tela_pedidos" class="tela hidden">

<div class="pedidos-container">

<div class="pedido-card">
  <h3>Novo Pedido</h3>

  <div class="grid">
    <input id="pedido_nome" placeholder="Cliente">
    <input id="pedido_tel" placeholder="Telefone">
    <input id="pedido_qtd" type="number" placeholder="Qtd">
  </div>

  <button class="btn-primary" onclick="criarPedidoUI()">Criar Pedido</button>
</div>

<div class="pedido-board">
  <div class="coluna"><h4>Pendentes</h4><div id="col_pendente"></div></div>
  <div class="coluna"><h4>Preparando</h4><div id="col_preparando"></div></div>
  <div class="coluna"><h4>Prontos</h4><div id="col_pronto"></div></div>
  <div class="coluna"><h4>Atrasados</h4><div id="col_atrasado"></div></div>
</div>

</div>
</div>

<!-- ================= IA ================= -->
<div id="tela_ia" class="tela hidden">

<div class="box">
  <h3>Gerador de Campanha</h3>

  <textarea id="promptIA" placeholder="Digite sua campanha..."></textarea>

  <button onclick="gerarMensagem()" class="btn-primary">
    Gerar Mensagem
  </button>

  <div id="respostaIA"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
