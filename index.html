<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Dona Marmita</h2>

    <nav>
      <button class="active">CRM</button>
      <button>Pedidos</button>
      <button>Campanhas</button>
      <button>Relatórios</button>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main">

    <!-- HEADER -->
    <div class="header">
      <h1>CRM de Clientes</h1>
      <button onclick="toggleDark()">🌙 Modo Escuro</button>
    </div>

    <!-- ETAPAS -->
    <div class="steps">
      <div class="step active">1. Importar</div>
      <div class="step">2. Configurar</div>
      <div class="step">3. Processar</div>
      <div class="step">4. Resultado</div>
    </div>

    <!-- UPLOAD -->
    <div class="upload-box">
      <input type="file" id="fileInput">
      <button onclick="carregar()">Carregar Planilha</button>
      <button id="btnProcessar" onclick="processar()">Analisar Clientes</button>
    </div>

    <!-- RESUMO -->
    <div id="resumo" class="resumo"></div>

    <!-- FILTROS -->
    <div class="filtros">
      <button onclick="setFiltro('Todos', this)" class="active">Todos</button>
      <button onclick="setFiltro('VIP', this)">VIP</button>
      <button onclick="setFiltro('Frequente', this)">Frequente</button>
      <button onclick="setFiltro('Em risco', this)">Risco</button>
      <button onclick="setFiltro('Inativo', this)">Inativo</button>
    </div>

    <!-- TABELA -->
    <div id="preview" class="tabela"></div>

  </main>

</div>
