<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Dona Marmita</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>
<body>

<div class="menu-top">
  <button onclick="toggle('configBox')">⚙️ Classificação</button>
  <button onclick="toggle('iaBox')">🤖 IA</button>
  <button onclick="toggleDark()">🌙 Dark</button>
</div>

<div class="topo">
  <input type="file" id="fileInput">
  <button onclick="carregar()">Carregar</button>
  <button onclick="processar()">Processar</button>
  <button onclick="baixarPlanilha()">Baixar</button>
</div>

<div class="container">

<div class="painel">
  <h3>Mapear</h3>
  <select id="map_nome"></select>
  <select id="map_tel"></select>
  <select id="map_data"></select>
  <select id="map_valor"></select>
  <select id="map_cidade"></select>
</div>

<div class="preview">
  <h2>Preview</h2>
  <div id="resumo"></div>
  <div id="preview"></div>
</div>

</div>

<!-- 🍱 PEDIDOS -->
<div class="box">
  <h3>Pedidos</h3>

  <input id="pedido_nome" placeholder="Cliente">
  <input id="pedido_tel" placeholder="Telefone">
  <input id="pedido_qtd" placeholder="Qtd" type="number">

  <button onclick="criarPedidoUI()">Criar Pedido</button>

  <div id="listaPedidos"></div>
</div>

<!-- 🤖 IA -->
<div id="iaBox" class="box hidden">
  <textarea id="promptIA"></textarea>
  <button onclick="gerarMensagem()">Gerar</button>
  <div id="respostaIA"></div>
</div>

<script src="script.js"></script>

</body>
</html>
