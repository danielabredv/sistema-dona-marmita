<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Dona Marmita</h2>

    <nav>
      <button class="active">CRM</button>
      <button>Pedidos</button>
      <button>Campanhas</button>
      <button>Relatórios</button>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main">

    <!-- HEADER -->
    <div class="header">
      <h1>CRM de Clientes</h1>
      <button onclick="toggleDark()">🌙 Modo Escuro</button>
    </div>

    <!-- ETAPAS -->
    <div class="steps">
      <div class="step active">1. Importar</div>
      <div class="step">2. Configurar</div>
      <div class="step">3. Processar</div>
      <div class="step">4. Resultado</div>
    </div>

    <!-- UPLOAD -->
    <div class="upload-box">
      <input type="file" id="fileInput">
      <button onclick="carregar()">Carregar Planilha</button>
      <button id="btnProcessar" onclick="processar()">Analisar Clientes</button>
    </div>

    <!-- RESUMO -->
    <div id="resumo" class="resumo"></div>

    <!-- FILTROS -->
    <div class="filtros">
      <button onclick="setFiltro('Todos', this)" class="active">Todos</button>
      <button onclick="setFiltro('VIP', this)">VIP</button>
      <button onclick="setFiltro('Frequente', this)">Frequente</button>
      <button onclick="setFiltro('Em risco', this)">Risco</button>
      <button onclick="setFiltro('Inativo', this)">Inativo</button>
    </div>

    <!-- TABELA -->
    <div id="preview" class="tabela"></div>

  </main>

  <div id="coreSistema" style="display:none;">

  <select id="map_nome"></select>
  <select id="map_tel"></select>
  <select id="map_data"></select>
  <select id="map_valor"></select>
  <select id="map_cidade"></select>

  <input type="date" id="data_inicio">
  <input type="date" id="data_fim">

  <input type="checkbox" id="cidade_aracaju" checked>
  <input type="checkbox" id="cidade_salvador" checked>

  <!-- CONFIGURAÇÕES -->
  <input type="number" id="cfg_vip_valor" value="1000">
  <input type="number" id="cfg_vip_qtd" value="10">
  <input type="number" id="cfg_freq_qtd" value="5">
  <input type="number" id="cfg_risco_min" value="15">
  <input type="number" id="cfg_risco_max" value="30">
  <input type="number" id="cfg_inativo" value="30">

</div>

</div>
